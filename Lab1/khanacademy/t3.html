<!DOCTYPE HTML>
<html>
    <head>
        <title>Challenge: Wishlist</title>
        <meta charset="utf-8">
    </head>
    <body>
    <h1>here we used h1 key</h1>
    <h2>h2 key to smaller text for titles etc...</h2>
    <p>(here we used ol key for ordered(numbered) list and li key for list item)</p>
    <ol>
        <li>first activity</li>
        <li>second activity</li>
        <li>Third activity</li>
    </ol>    
	
    <p><strong>(here we used ul key for unordered list and li key for list item)</strong></p>
    <ul>
        <li>cheetah</li>
        <li>wolf</li>
        <li>lion</li>
    </ul>   
        
    </body>
</html>
